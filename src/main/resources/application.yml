spring:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_LN4I1DaPa/.well-known/jwks.json
          issuer-uri: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_LN4I1DaPa

db:
  secret:
    name: hcc/dev/db
s3:
  secret:
    name: hcc/dev/s3/secrets

aws:
  region: us-east-1
internal:
  api-key: hcc-internal-secure-key-2026

